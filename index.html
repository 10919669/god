            const left = Math.random() * 100;

            const delay = Math.random() * 5;

    }
</script>
<script>
    const orbit = document.querySelector('.orbital-ring');
    const items = document.querySelectorAll('.oracle-card-inner');
    const totalCards = items.length;
    const speed = 360 / 20;
    let angle = 0;
    let paused = false;
    let lastTime = null;

    function isMobileOrbit() {
        return window.matchMedia('(max-width: 767px)').matches;
    }

    function renderDesktopOrbit() {
        orbit.style.transform = 'rotateY(' + angle + 'deg)';
        items.forEach((item, i) => {
            const card = item.querySelector('.orbit-card');
            if (!card) return;
            item.style.zIndex = '1';

            const totalAngle = i * (360 / totalCards) + angle;
            let norm = ((totalAngle % 360) + 360) % 360;
            if (norm > 180) norm -= 360;
            const absNorm = Math.abs(norm);

            if (absNorm > 100) {
                item.style.opacity = '0';
                item.style.pointerEvents = 'none';
                item.style.transform = '';
                card.style.transform = '';
            } else {
                const opacity = 1 - (absNorm / 100) * 0.4;
                item.style.opacity = String(Math.max(0.6, opacity));
                item.style.pointerEvents = 'auto';
                item.style.transform = '';
                card.style.transform = '';
            }
        });
    }

    function renderMobileOrbit() {
        renderDesktopOrbit();
    }

    function activateOrbitCard(card) {
        const tpl = card?.getAttribute('data-tpl');
        if (!tpl) return;
        const now = Date.now();
        if (window._orbitTapLock && now - window._orbitTapLock < 350) return;
        window._orbitTapLock = now;
        const q = card.getAttribute('data-q');
        if (typeof window.startFromUniverse === 'function') {
            window.startFromUniverse(tpl, q || undefined);
            return;
        }
        window.__pendingUniverseStart = { templateId: tpl, questionText: q || undefined };
        document.dispatchEvent(new CustomEvent('awkn:start-universe', { detail: window.__pendingUniverseStart }));
    }

    function animate(time) {
        if (!lastTime) lastTime = time;
        const delta = (time - lastTime) / 1000;
        lastTime = time;

        if (!paused && !window._orbitPaused) {
            angle = (angle + speed * delta) % 360;
        }

        if (isMobileOrbit()) {
            renderMobileOrbit();
        } else {
            renderDesktopOrbit();
        }

        if (!window._orbitPaused) {
            window._orbitRAF = requestAnimationFrame(animate);
        }
    }

    window._orbitRAF = requestAnimationFrame(animate);
    window._startOrbitAnimation = function() {
        lastTime = null;
        window._orbitRAF = requestAnimationFrame(animate);
    };

    const cards = document.querySelectorAll('.orbit-card');
    cards.forEach(card => {
        card.addEventListener('mouseenter', () => { paused = true; });
        card.addEventListener('mouseleave', () => { paused = false; });
        card.addEventListener('touchstart', () => { paused = true; }, { passive: true });
        card.addEventListener('touchend', () => { setTimeout(() => { paused = false; }, 800); }, { passive: true });
        card.addEventListener('pointerdown', (e) => {
            if (e.pointerType !== 'mouse') paused = true;
        });
        card.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            activateOrbitCard(card);
        });
        card.addEventListener('pointerup', (e) => {
            if (e.pointerType !== 'mouse') {
                e.preventDefault();
                e.stopPropagation();
                activateOrbitCard(card);
            }
        });
    });

    window.addEventListener('resize', () => {
        if (isMobileOrbit()) {
            renderMobileOrbit();
        } else {
            renderDesktopOrbit();
        }
    });
</script>
